<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1440" />
    <title>Attend-AI · Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme BEFORE any content paints, to avoid a flash of light mode.
      (function () {
        try {
          var t = localStorage.getItem("attend-ai-theme") || "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: "#f7f4ee",
              ink: "#2b2b2b",
              slate900: "#1f2937",
              slate800: "#1e293b",
              slate500: "#64748b",
              headerbg: "#f4f4f4",
              accentYellow: "#f5d800",
              accentBlue: "#1a4bff",
              blue2: "#2563eb",
              accentRed: "#e8230a",
              accentRedDark: "#d32f2f",
              softBlue: "#eff6ff",
            },
            fontFamily: {
              display: ["Anton", "Impact", "sans-serif"],
              inter: ["Inter", "system-ui", "sans-serif"],
              geist: ["Geist", "Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-canvas font-inter text-ink antialiased">
    <div id="app"></div>

    <!-- Screen modules -->
    <script src="icons.js"></script>
    <script src="shared.js"></script>
    <script src="screens/homepage.js"></script>
    <script src="screens/login.js"></script>
    <script src="screens/admin-dashboard.js"></script>
    <script src="screens/hod-dashboard.js"></script>
    <script src="screens/todays-attendance.js"></script>
    <script src="screens/past-months-attendance.js"></script>
    <script src="screens/manage-profiles.js"></script>
    <script src="screens/new-profile.js"></script>
    <script src="screens/live-camera-view.js"></script>
    <script src="screens/system-settings.js"></script>
    <script src="screens/directory.js"></script>
    <script src="router.js"></script>
  </body>
</html>
